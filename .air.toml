root = "."
tmp_dir = "tmp/air-agentgo-ui"

[build]
cmd = "env GOCACHE=/tmp/go-build-cache GOMODCACHE=/tmp/go-mod-cache go build -o ./tmp/air-agentgo-ui/agentgo-ui ./cmd/agentgo-ui"
bin = "./tmp/air-agentgo-ui/agentgo-ui"
full_bin = "./tmp/air-agentgo-ui/agentgo-ui --host 127.0.0.1 --port 7127"
delay = 500
stop_on_error = true
exclude_dir = ["bin", "tmp", "ui", "node_modules", "cmd/agentgo-ui/dist"]
include_ext = ["go", "html", "json", "yaml", "yml"]

[log]
time = true

[misc]
clean_on_exit = true
