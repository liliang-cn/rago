syntax = "proto3";

package ptc;

option go_package = "github.com/liliang-cn/rago/v2/pkg/ptc/grpc/pb";

// PTCService provides programmatic tool calling functionality
service PTCService {
    // Execute runs code in a sandbox environment
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);

    // ExecuteStream runs code and streams output
    rpc ExecuteStream(ExecuteRequest) returns (stream ExecuteChunk);

    // ListTools returns available tools
    rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

    // GetToolInfo returns information about a specific tool
    rpc GetToolInfo(GetToolInfoRequest) returns (GetToolInfoResponse);
}

// ExecuteRequest represents a code execution request
message ExecuteRequest {
    // Code to execute
    string code = 1;
    // Language of the code (javascript, wasm)
    string language = 2;
    // Context variables to inject (JSON encoded)
    map<string, string> context = 3;
    // List of allowed tools
    repeated string tools = 4;
    // Timeout in milliseconds
    int32 timeout_ms = 5;
    // Maximum memory in MB
    int32 max_memory_mb = 6;
}

// ExecuteResponse represents the result of code execution
message ExecuteResponse {
    // Whether execution succeeded
    bool success = 1;
    // Output from execution (JSON encoded)
    string output = 2;
    // Return value from code (JSON encoded)
    string return_value = 3;
    // Error message if failed
    string error = 4;
    // Tool calls made during execution
    repeated ToolCallRecord tool_calls = 5;
    // Logs from console.log
    repeated string logs = 6;
    // Duration in milliseconds
    int64 duration_ms = 7;
    // Execution ID
    string execution_id = 8;
}

// ExecuteChunk represents a chunk of streaming output
message ExecuteChunk {
    // Type of chunk
    enum ChunkType {
        OUTPUT = 0;
        LOG = 1;
        TOOL_CALL = 2;
        ERROR = 3;
        DONE = 4;
    }
    // Chunk type
    ChunkType type = 1;
    // Chunk content
    string content = 2;
    // Timestamp
    int64 timestamp_ms = 3;
}

// ToolCallRecord represents a tool call made during execution
message ToolCallRecord {
    // Tool name
    string tool_name = 1;
    // Arguments passed (JSON encoded)
    string arguments = 2;
    // Result returned (JSON encoded)
    string result = 3;
    // Error if failed
    string error = 4;
    // Duration in milliseconds
    int64 duration_ms = 5;
}

// ListToolsRequest requests available tools
message ListToolsRequest {
    // Optional filter by category
    string category = 1;
}

// ListToolsResponse contains available tools
message ListToolsResponse {
    // List of tools
    repeated ToolInfo tools = 1;
}

// GetToolInfoRequest requests info about a specific tool
message GetToolInfoRequest {
    // Tool name
    string name = 1;
}

// GetToolInfoResponse contains tool information
message GetToolInfoResponse {
    // Tool information
    ToolInfo tool = 1;
    // Whether tool exists
    bool exists = 2;
}

// ToolInfo contains information about a tool
message ToolInfo {
    // Tool name
    string name = 1;
    // Tool description
    string description = 2;
    // Parameter schema (JSON Schema encoded)
    string parameters = 3;
    // Tool category (rag, mcp, skill, custom)
    string category = 4;
}
